<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up The Odin Project</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div id="base">

        <div class="sidebar">
            <img src="./assets/odinimage.jpg" alt="background image" id="background-image">
            <div id="absolute-comp">
                <img src="./assets/odin-lined.png" id="odin-lined">
                <p id="logo-text">ODIN</p>
            </div>
        </div>

        <div class="content-side">
            <div class="header-text">
                <h2>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.</h2>
                <h2>Sign up <em>now</em> to get started.</h2>
                <h2 id="hook">You <i>know</i> you want to.</h2>
            </div>
            
            <form action="post" id="create-account">
                <div id="form-block">
                    <h3>Let's do this!</h3>
                    <div id="form-halving">
                        <div class="form-column">
                            <div class="form-group">
                                <label for="first-name">FIRST NAME</label>
                                <input type="text" id="first-name" name="first-name" required minlength="2">
                            </div>
                            <div class="form-group">
                                <label for="email">EMAIL</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="password">PASSWORD</label>
                                <input type="password" id="password" name="password" required minlength="8">
                            </div>
                        </div>
                        <div class="form-column">
                            <div class="form-group">
                                <label for="last-name">LAST NAME</label>
                                <input type="text" id="last-name" name="last-name" required minlength="2">
                            </div>
                            <div class="form-group">
                                <label for="phone-number">PHONE NUMBER</label>
                                <input type="tel" id="phone-number" name="phone-number">
                            </div>
                            <div class="form-group">
                                <label for="confirm-password">CONFIRM PASSWORD</label>
                                <input type="password" id="confirm-password" name="confirm-password" required minlength="8">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="action-block">
                    <button type="submit">Create Account</button>
                    <p>Already have an account? <a href="#">Log in</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
